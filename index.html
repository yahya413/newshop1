<!DOCTYPE html>
<html lang="ar" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Shop - Professional</title>
    <style>
        :root {
            --primary: #4a90e2; /* أزرق مريح للعين */
            --bg: #f8f9fa;
            --text: #2d3436;
            --3d-shadow: 8px 8px 15px #d1d9e6, -8px -8px 15px #ffffff;
            --inner-shadow: inset 5px 5px 10px #d1d9e6, inset -5px -5px 10px #ffffff;
        }

        body {
            margin: 0; background: var(--bg); font-family: 'Segoe UI', sans-serif;
            color: var(--text); transition: 0.3s;
        }

        /* شريط العروض العلوي */
        .offer-ticker {
            background: #fff; border-bottom: 2px solid var(--primary);
            padding: 10px; font-weight: bold; overflow: hidden; white-space: nowrap;
        }
        .ticker-move { display: inline-block; animation: ticker 20s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* الهيدر العلوي */
        .top-nav {
            display: flex; justify-content: space-between; padding: 15px;
            align-items: center; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* القائمة الجانبية للتجار */
        .sidebar {
            position: fixed; top: 0; right: -250px; width: 250px; height: 100%;
            background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            transition: 0.3s; z-index: 2000; padding: 20px;
        }
        .sidebar.open { right: 0; }

        /* الأزرار الـ 3D المريحة */
        .card-3d {
            background: var(--bg); border-radius: 20px; padding: 20px;
            text-align: center; box-shadow: var(--3d-shadow);
            cursor: pointer; transition: 0.2s; border: none; margin: 10px;
        }
        .card-3d:active { box-shadow: var(--inner-shadow); transform: scale(0.98); }

        /* الصفحات */
        .page { display: none; padding: 20px; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* تصميم الفورم المريح */
        input, select {
            width: 100%; padding: 12px; margin: 10px 0; border: none;
            border-radius: 10px; background: var(--bg); box-shadow: var(--inner-shadow);
            box-sizing: border-box; outline: none;
        }
        .btn-main {
            background: var(--primary); color: white; border: none; padding: 12px 25px;
            border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%;
        }

        .back-btn { background: #ddd; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="sidebar" class="sidebar">
        <h3>بوابة التجار</h3>
        <p>سجل محلك الآن وابدأ البيع</p>
        <button class="btn-main" onclick="showPage('merchantReg')">تسجيل محل جديد</button>
        <br><br>
        <button class="btn-main" style="background:#636e72" onclick="toggleSidebar()">إغلاق</button>
    </div>

    <div class="top-nav">
        <button onclick="toggleSidebar()">☰ بوابة التاجر</button>
        <h2 style="margin:0; color:var(--primary)">New Shop</h2>
        <button onclick="toggleLang()">EN / عربي</button>
    </div>

    <div class="offer-ticker" id="tickerSection" style="display: none;">
        <div class="ticker-move" id="tickerText"></div>
    </div>

    <div id="home" class="page active">
        <div style="display: grid; grid-template-columns: 1fr 1fr;">
            <div class="card-3d" onclick="showPage('stores')">
                <span style="font-size:40px">🏪</span><br><b>المتاجر</b>
            </div>
            <div class="card-3d" onclick="showPage('delivery')">
                <span style="font-size:40px">🛵</span><br><b>الدليفري</b>
            </div>
            <div class="card-3d" onclick="showPage('profile')">
                <span style="font-size:40px">👤</span><br><b>حسابي</b>
            </div>
            <div class="card-3d" onclick="alert('قريباً...')">
                <span style="font-size:40px">🎁</span><br><b>عروض حصرية</b>
            </div>
        </div>
    </div>

    <div id="stores" class="page">
        <button class="back-btn" onclick="showPage('home')">⬅ رجوع</button>
        <h3>تصفح المتاجر</h3>
        <input type="text" id="storeSearch" placeholder="ابحث عن (حلاق، مطعم، سوبر ماركت...)" onkeyup="filterStores()">
        <div id="storesList">
            <div class="card-3d" onclick="tryBuy('سوبر ماركت الأمانة')">سوبر ماركت الأمانة</div>
            <div class="card-3d" onclick="tryBuy('حلاق الشياكة')">حلاق الشياكة</div>
            <div class="card-3d" onclick="tryBuy('سايبر نت')">سايبر نت</div>
            <div class="card-3d" onclick="tryBuy('مطعم الهناء')">مطعم الهناء</div>
            <div class="card-3d" onclick="tryBuy('مول العرب')">مول العرب</div>
        </div>
    </div>

    <div id="customerLogin" class="page">
        <button class="back-btn" onclick="showPage('stores')">⬅ رجوع</button>
        <h3>إكمال بيانات الشراء</h3>
        <p id="targetStore"></p>
        <div class="form-3d" style="background:white; padding:20px; border-radius:20px;">
            <input type="email" placeholder="البريد الإلكتروني">
            <input type="text" placeholder="الموقع الجغرافي (GPS)">
            <select>
                <option>وسيلة الدفع</option>
                <option>كاش عند الاستلام</option>
                <option>محفظة إلكترونية</option>
                <option>فيزا</option>
            </select>
            <button class="btn-main" onclick="alert('تم حفظ بياناتك وتأكيد الطلب!'); showPage('home')">تأكيد الشراء</button>
        </div>
    </div>

    <div id="merchantReg" class="page">
        <button class="back-btn" onclick="toggleSidebar(); showPage('home')">⬅ رجوع</button>
        <h3>تسجيل محل جديد</h3>
        <input type="text" placeholder="اسم المحل">
        <select>
            <option>نوع المحل</option>
            <option>سوبر ماركت</option>
            <option>صيدلية</option>
            <option>حلاق</option>
            <option>سايبر</option>
            <option>مطعم</option>
            <option>مول</option>
        </select>
        <input type="text" placeholder="إثبات الهوية">
        <button class="btn-main" onclick="addOffer()">تسجيل وإضافة عرض تجريبي</button>
    </div>

    <script>
        // تبديل الصفحات
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id !== 'merchantReg') document.getElementById('sidebar').classList.remove('open');
        }

        // القائمة الجانبية
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // اللغة
        function toggleLang() {
            let html = document.getElementById('mainHtml');
            if(html.dir === 'rtl') {
                html.dir = 'ltr'; html.lang = 'en';
            } else {
                html.dir = 'rtl'; html.lang = 'ar';
            }
        }

        // محاولة الشراء
        function tryBuy(storeName) {
            document.getElementById('targetStore').innerText = "أنت الآن تشتري من: " + storeName;
            showPage('customerLogin');
        }

        // محرك البحث
        function filterStores() {
            let input = document.getElementById('storeSearch').value.toLowerCase();
            let cards = document.getElementById('storesList').getElementsByClassName('card-3d');
            for (let i = 0; i < cards.length; i++) {
                if (cards[i].innerText.toLowerCase().includes(input)) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }

        // إضافة عرض (تخيل أن التاجر أضاف عرضاً)
        function addOffer() {
            let store = "محل تجريبي";
            document.getElementById('tickerSection').style.display = "block";
            document.getElementById('tickerText').innerText = "🔥 عرض جديد من " + store + ": خصم 20% على كل شيء!";
            alert("تم تسجيل المحل وظهر عرضك في الشريط العلوي!");
            showPage('home');
        }
    </script>
</body>
</html>
