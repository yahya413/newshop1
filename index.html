<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Shop | متجرك المفضل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
        /* لإخفاء شريط التمرير العرضي مع الحفاظ على الوظيفة */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50">

    <header class="bg-green-500 p-4 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex flex-wrap justify-between items-center gap-4">
            <div class="text-2xl font-extrabold text-black">NEW <span class="text-white">SHOP</span></div>
            
            <div class="flex-1 max-w-2xl relative">
                <input type="text" placeholder="ما الذي يبحث عنه محلك المفضل؟" class="w-full p-2 pr-10 rounded-lg border-none focus:ring-2 focus:ring-green-700 outline-none">
                <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
            </div>

            <div class="flex items-center gap-6 font-bold text-black">
                <div class="cursor-pointer hover:text-white transition">تسجيل الدخول <i class="fas fa-user ml-1"></i></div>
                <div class="cursor-pointer hover:text-white transition relative">
                    السلة <i class="fas fa-shopping-cart ml-1"></i>
                    <span class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full h-4 w-4 flex items-center justify-center">0</span>
                </div>
            </div>
        </div>
    </header>

    <nav class="bg-white border-b overflow-x-auto whitespace-nowrap py-3 text-sm shadow-sm no-scrollbar">
        <div class="container mx-auto flex gap-8 px-4 justify-center">
            <a href="#" class="text-black hover:text-green-600 font-bold">السوبر ماركت</a>
            <a href="#" class="text-black hover:text-green-600 font-bold">الخضروات والفاكهة</a>
            <a href="#" class="text-black hover:text-green-600 font-bold">المخبوزات</a>
            <a href="#" class="text-black hover:text-green-600 font-bold">اللحوم</a>
            <a href="#" class="text-black hover:text-green-600 font-bold">العروض اليومية</a>
        </div>
    </nav>

    <section class="container mx-auto mt-4 px-4">
        <div class="bg-green-700 rounded-2xl h-64 md:h-80 flex items-center justify-between text-white px-8 md:px-16 relative overflow-hidden">
            <div class="z-10">
                <h1 class="text-4xl font-extrabold mb-4">تسوق ذكي.. توصيل سريع</h1>
                <p class="text-xl mb-6 text-green-100">كل احتياجات بيتك في مكان واحد وبأفضل سعر في المنطقة</p>
                <button class="bg-black text-white px-10 py-3 rounded-full font-bold hover:bg-gray-800 transition shadow-lg">تصفح المحلات</button>
            </div>
            <i class="fas fa-store absolute -left-10 text-[200px] text-green-600 opacity-20"></i>
        </div>
    </section>

    <section class="container mx-auto mt-8 px-4">
        <h2 class="text-xl font-bold mb-6 text-black border-r-4 border-green-500 pr-3">تسوق حسب القسم</h2>
        <div class="flex gap-4 overflow-x-auto pb-4 justify-between no-scrollbar">
            
            <div class="flex flex-col items-center min-w-[110px] group cursor-pointer">
                <div class="w-24 h-24 bg-white rounded-full shadow-sm border border-gray-100 flex items-center justify-center group-hover:shadow-green-200 group-hover:border-green-500 transition-all duration-300">
                    <i class="fas fa-apple-alt text-4xl text-black"></i> </div>
                <span class="mt-3 text-sm font-bold text-black text-center">خضروات</span> </div>

            <div class="flex flex-col items-center min-w-[110px] group cursor-pointer">
                <div class="w-24 h-24 bg-white rounded-full shadow-sm border border-gray-100 flex items-center justify-center group-hover:shadow-green-200 group-hover:border-green-500 transition-all duration-300">
                    <i class="fas fa-bread-slice text-4xl text-black"></i>
                </div>
                <span class="mt-3 text-sm font-bold text-black text-center">مخبوزات</span>
            </div>

            <div class="flex flex-col items-center min-w-[110px] group cursor-pointer">
                <div class="w-24 h-24 bg-white rounded-full shadow-sm border border-gray-100 flex items-center justify-center group-hover:shadow-green-200 group-hover:border-green-500 transition-all duration-300">
                    <i class="fas fa-cheese text-4xl text-black"></i>
                </div>
                <span class="mt-3 text-sm font-bold text-black text-center">ألبان</span>
            </div>

            <div class="flex flex-col items-center min-w-[110px] group cursor-pointer">
                <div class="w-24 h-24 bg-white rounded-full shadow-sm border border-gray-100 flex items-center justify-center group-hover:shadow-green-200 group-hover:border-green-500 transition-all duration-300">
                    <i class="fas fa-drumstick-bite text-4xl text-black"></i>
                </div>
                <span class="mt-3 text-sm font-bold text-black text-center">لحوم وطـيور</span>
            </div>

            <div class="flex flex-col items-center min-w-[110px] group cursor-pointer">
                <div class="w-24 h-24 bg-white rounded-full shadow-sm border border-gray-100 flex items-center justify-center group-hover:shadow-green-200 group-hover:border-green-500 transition-all duration-300">
                    <i class="fas fa-bottle-water text-4xl text-black"></i>
                </div>
                <span class="mt-3 text-sm font-bold text-black text-center">منظفات</span>
            </div>

        </div>
    </section>

</body>
</html>
