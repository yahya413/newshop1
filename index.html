<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Shop | متجرك المفضل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">

    <header class="bg-yellow-400 p-4 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto flex flex-wrap justify-between items-center gap-4">
            <div class="text-2xl font-bold text-black">NEW <span class="text-white">SHOP</span></div>
            
            <div class="flex-1 max-w-2xl relative">
                <input type="text" placeholder="ما الذي تبحث عنه؟" class="w-full p-2 pr-10 rounded-lg border-none focus:ring-2 focus:ring-blue-500">
                <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
            </div>

            <div class="flex items-center gap-6 font-semibold">
                <div class="cursor-pointer hover:text-white">تسجيل الدخول <i class="fas fa-user ml-1"></i></div>
                <div class="cursor-pointer hover:text-white">السلة <i class="fas fa-shopping-cart ml-1"></i></div>
            </div>
        </div>
    </header>

    <nav class="bg-white border-b overflow-x-auto whitespace-nowrap py-2 text-sm shadow-sm">
        <div class="container mx-auto flex gap-8 px-4 justify-center">
            <a href="#" class="hover:text-yellow-500 font-bold">الإلكترونيات</a>
            <a href="#" class="hover:text-yellow-500 font-bold">السوبر ماركت</a>
            <a href="#" class="hover:text-yellow-500 font-bold">أزياء الرجال</a>
            <a href="#" class="hover:text-yellow-500 font-bold">أزياء النساء</a>
            <a href="#" class="hover:text-yellow-500 font-bold">لوازم المنزل</a>
            <a href="#" class="hover:text-yellow-500 font-bold">العروض اليومية</a>
        </div>
    </nav>

    <section class="container mx-auto mt-4 px-4">
        <div class="bg-blue-600 rounded-xl h-64 md:h-80 flex items-center justify-center text-white text-center relative overflow-hidden">
            <div class="z-10">
                <h1 class="text-4xl font-extrabold mb-4">عروض الربيع وصلت!</h1>
                <p class="text-xl mb-6">خصومات تصل إلى 75% على جميع الأقسام</p>
                <button class="bg-yellow-400 text-black px-8 py-3 rounded-full font-bold hover:bg-yellow-300 transition">اشترِ الآن</button>
            </div>
            <div class="absolute -right-20 -top-20 w-64 h-64 bg-blue-500 rounded-full opacity-50"></div>
        </div>
    </section>

    <section class="container mx-auto mt-8 px-4">
        <div class="flex gap-4 overflow-x-auto pb-4 justify-between no-scrollbar">
            <div class="flex flex-col items-center min-w-[100px] cursor-pointer">
                <div class="w-20 h-20 bg-white rounded-full shadow-md flex items-center justify-center hover:scale-110 transition">
                    <i class="fas fa-mobile-alt text-3xl text-gray-700"></i>
                </div>
                <span class="mt-2 text-xs font-bold text-center">الموبايلات</span>
            </div>
            <div class="flex flex-col items-center min-w-[100px] cursor-pointer">
                <div class="w-20 h-20 bg-white rounded-full shadow-md flex items-center justify-center hover:scale-110 transition">
                    <i class="fas fa-laptop text-3xl text-gray-700"></i>
                </div>
                <span class="mt-2 text-xs font-bold text-center">الإلكترونيات</span>
            </div>
            <div class="flex flex-col items-center min-w-[100px] cursor-pointer">
                <div class="w-20 h-20 bg-white rounded-full shadow-md flex items-center justify-center hover:scale-110 transition">
                    <i class="fas fa-tshirt text-3xl text-gray-700"></i>
                </div>
                <span class="mt-2 text-xs font-bold text-center">الأزياء</span>
            </div>
            <div class="flex flex-col items-center min-w-[100px] cursor-pointer">
                <div class="w-20 h-20 bg-white rounded-full shadow-md flex items-center justify-center hover:scale-110 transition">
                    <i class="fas fa-apple-alt text-3xl text-gray-700"></i>
                </div>
                <span class="mt-2 text-xs font-bold text-center">السوبر ماركت</span>
            </div>
            <div class="flex flex-col items-center min-w-[100px] cursor-pointer">
                <div class="w-20 h-20 bg-white rounded-full shadow-md flex items-center justify-center hover:scale-110 transition">
                    <i class="fas fa-home text-3xl text-gray-700"></i>
                </div>
                <span class="mt-2 text-xs font-bold text-center">المنزل</span>
            </div>
        </div>
    </section>

</body>
</html>
