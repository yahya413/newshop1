<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Shop | متجرك المفضل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* حركات التبديل السلسة للسليدر */
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50">

    <section class="container mx-auto mt-4 px-4 overflow-hidden relative group">
        
        <div id="main-slider" class="bg-green-700 rounded-2xl h-64 md:h-80 flex items-center justify-between text-white px-8 md:px-16 transition-all duration-300 shadow-xl overflow-hidden relative fade-in">
            
            <div id="slider-content" class="z-10 w-full md:w-1/2">
                <h1 id="slider-title" class="text-3xl md:text-4xl font-extrabold mb-4 leading-tight">تسوق ذكي.. توصيل سريع</h1>
                <p id="slider-desc" class="text-lg md:text-xl mb-6 text-green-100">كل احتياجات بيتك في مكان واحد وبأفضل سعر في المنطقة</p>
                <button class="bg-black text-white px-10 py-3 rounded-full font-bold hover:bg-gray-800 transition shadow-lg relative z-20">اشترِ الآن</button>
            </div>

            <div id="slider-image-container" class="z-10 w-full md:w-1/2 flex justify-center items-center h-full relative">
                <i class="fas fa-store absolute text-[200px] text-green-600 opacity-20 -left-10 z-0"></i>
                
                <img id="slider-product-img" src="https://assets.nooncdn.com/products/tr:n-t_400/v1672323281/N50186524A_1.jpg" alt="منتج معروض" class="h-48 md:h-60 object-contain drop-shadow-2xl z-10 transition-transform group-hover:scale-105 duration-300">
            </div>
            
            <button onclick="prevSlide()" class="absolute right-3 top-1/2 -translate-y-1/2 bg-white/20 p-3 rounded-full opacity-0 group-hover:opacity-100 transition"><i class="fas fa-chevron-right text-black"></i></button>
            <button onclick="nextSlide()" class="absolute left-3 top-1/2 -translate-y-1/2 bg-white/20 p-3 rounded-full opacity-0 group-hover:opacity-100 transition"><i class="fas fa-chevron-left text-black"></i></button>
            
            <div id="slider-dots" class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2">
                </div>
        </div>
    </section>

    <script>
        // داتا تجريبية تحاكي منتجات حقيقية من Firebase
        const productsData = [
            {
                id: 1,
                title: "عروض السوبر ماركت!",
                desc: "وفر حتى 30% على مستلزمات البقالة اليومية لأهل أكتوبر.",
                img: "https://noon-b-cdn.nooncdn.com/p_4141/N44093910A_1.webp",
                bgColor: "bg-green-700",
                btnLink: "#"
            },
            {
                id: 2,
                title: "أحدث الموبايلات وصلت",
                desc: "جالاكسي S24 بخصومات خيالية. التوصيل مجاني اليوم!",
                img: "https://noon-b-cdn.nooncdn.com/p_4141/N70035133A_1.webp",
                bgColor: "bg-green-800",
                btnLink: "#"
            },
            {
                id: 3,
                title: "تجهيز المطبخ بأفضل سعر",
                desc: "طقم حلل جرانيت و قلايات هوائية.. جودة ألمانية.",
                img: "https://assets.nooncdn.com/products/tr:n-t_400/v1672323281/N50186524A_1.jpg",
                bgColor: "bg-green-600",
                btnLink: "#"
            }
        ];

        let currentIndex = 0;
        const slider = document.getElementById('main-slider');
        const title = document.getElementById('slider-title');
        const desc = document.getElementById('slider-desc');
        const productImg = document.getElementById('slider-product-img');
        const dotsContainer = document.getElementById('slider-dots');

        // إنشاء نقاط الترقيم
        function createDots() {
            productsData.forEach((_, index) => {
                const dot = document.createElement('div');
                dot.className = `w-2.5 h-2.5 rounded-full ${index === 0 ? 'bg-white' : 'bg-white/40'} cursor-pointer transition`;
                dot.onclick = () => goToSlide(index);
                dotsContainer.appendChild(dot);
            });
        }

        // تحديث محتوى السلايد
        function updateSlider(index) {
            const data = productsData[index];
            
            // إضافة حركة الـ Fade للتغيير
            slider.classList.add('fade-in');
            setTimeout(() => slider.classList.remove('fade-in'), 500);
            
            title.textContent = data.title;
            desc.textContent = data.desc;
            productImg.src = data.img;
            
            // تغيير لون الخلفية تدريجياً
            slider.className = `${data.bgColor} rounded-2xl h-64 md:h-80 flex items-center justify-between text-white px-8 md:px-16 transition-all duration-300 shadow-xl overflow-hidden relative group`;

            // تحديث حالة النقاط
            Array.from(dotsContainer.children).forEach((dot, i) => {
                dot.className = `w-2.5 h-2.5 rounded-full ${i === index ? 'bg-white' : 'bg-white/40'} cursor-pointer transition`;
            });
        }

        // الوظائف الأساسية
        function nextSlide() { currentIndex = (currentIndex + 1) % productsData.length; updateSlider(currentIndex); }
        function prevSlide() { currentIndex = (currentIndex - 1 + productsData.length) % productsData.length; updateSlider(currentIndex); }
        function goToSlide(index) { currentIndex = index; updateSlider(currentIndex); }

        // بدء التشغيل
        createDots();
        
        // تغيير المنتج كل 2 ثانية (2000 مللي ثانية)
        let autoPlayInterval = setInterval(nextSlide, 2000);

        // إيقاف التشغيل التلقائي عند الهوفر على السلايد
        slider.onmouseenter = () => clearInterval(autoPlayInterval);
        slider.onmouseleave = () => autoPlayInterval = setInterval(nextSlide, 2000);

    </script>
</body>
</html>
