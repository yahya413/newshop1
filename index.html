<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Shop - Merchant Portal</title>
    <style>
        :root {
            --primary: #ff4d4d;
            --secondary: #ff944d;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --shadow: 0 10px 20px rgba(0,0,0,0.08);
        }

        body {
            margin: 0;
            background: var(--bg);
            font-family: 'Segoe UI', sans-serif;
            color: #333;
        }

        /* تصميم الهيدر 3D */
        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 30px 20px;
            text-align: center;
            border-radius: 0 0 40px 40px;
            box-shadow: 0 8px 20px rgba(255, 77, 77, 0.2);
            margin-bottom: 30px;
        }

        /* الحاويات والصفحات */
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .page { display: none; animation: slideUp 0.4s ease; }
        .page.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* الأزرار والأيقونات 3D */
        .btn-3d {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: var(--shadow);
            border-bottom: 6px solid #e0e0e0;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 20px;
        }

        .btn-3d:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
        }

        .icon { font-size: 50px; display: block; margin-bottom: 10px; }

        /* نموذج تسجيل التاجر */
        .form-card {
            background: white;
            padding: 25px;
            border-radius: 25px;
            box-shadow: var(--shadow);
            border: 1px solid #eee;
        }

        .input-group { margin-bottom: 18px; text-align: right; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; font-size: 14px; }
        
        input, select {
            width: 100%;
            padding: 14px;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
            background: #fafafa;
            box-sizing: border-box;
        }

        input:focus, select:focus { border-color: var(--secondary); background: white; }

        .submit-btn {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 15px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 77, 0.3);
            margin-top: 10px;
        }

        .back-btn {
            background: none;
            border: none;
            color: #777;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>

    <div id="homePage" class="page active">
        <header>
            <h1 style="margin:0;">New Shop</h1>
            <p>أهلاً بك يا يحيى في متجرك المتطور</p>
        </header>

        <div class="container">
            <div class="btn-3d" onclick="goToPage('merchantPage')">
                <span class="icon">💼</span>
                <span style="font-weight:bold; font-size:18px;">تسجيل دخول التجار</span>
                <p style="color:#888; font-size:13px; margin:5px 0 0;">اضف محلك وابدأ البيع الآن</p>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="btn-3d" style="padding: 15px;">
                    <span class="icon" style="font-size:30px;">🛵</span>
                    <span>الدليفري</span>
                </div>
                <div class="btn-3d" style="padding: 15px;">
                    <span class="icon" style="font-size:30px;">🏪</span>
                    <span>المتاجر</span>
                </div>
            </div>
        </div>
    </div>

    <div id="merchantPage" class="page">
        <div class="container">
            <button class="back-btn" onclick="goToPage('homePage')"> ➡️ العودة للرئيسية </button>
            
            <div class="form-card">
                <h2 style="text-align:center; margin-top:0; color:var(--primary);">بيانات التاجر</h2>
                <p style="text-align:center; color:#777; font-size:13px; margin-bottom:25px;">يرجى إدخال بيانات دقيقة لتوثيق متجرك</p>

                <div class="input-group">
                    <label>اسم المحل / المتجر</label>
                    <input type="text" placeholder="مثال: سوبر ماركت الأمانة">
                </div>

                <div class="input-group">
                    <label>نوع النشاط</label>
                    <select>
                        <option>اختر النوع...</option>
                        <option>صيدلية</option>
                        <option>حلاق</option>
                        <option>سوبر ماركت</option>
                        <option>مطعم</option>
                        <option>بقالة</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>البريد الإلكتروني للمتجر</label>
                    <input type="email" placeholder="email@store.com">
                </div>

                <div class="input-group">
                    <label>الموقع الجغرافي (GPS)</label>
                    <input type="text" placeholder="رابط خرائط جوجل أو العنوان التفصيلي">
                </div>

                <div class="input-group">
                    <label>وسائل التواصل (واتساب/تليجرام)</label>
                    <input type="text" placeholder="رقم الموبايل">
                </div>

                <div class="input-group">
                    <label>إثبات الشخصية</label>
                    <input type="text" placeholder="رقم البطاقة أو السجل التجاري">
                </div>

                <button class="submit-btn" onclick="alert('تم إرسال طلبك بنجاح! سيتم التواصل معك قريباً.')">إنشاء حساب تاجر</button>
            </div>
        </div>
    </div>

    <script>
        function goToPage(pageId) {
            // إخفاء جميع الصفحات
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // إظهار الصفحة المطلوبة
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0,0);
        }
    </script>

</body>
</html>
