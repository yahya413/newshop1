<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Shop</title>
    <style>
        /* الألوان الأساسية */
        :root {
            --light-red: #ff4d4d;
            --orange: #ff944d;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: sans-serif;
            overflow: hidden;
        }

        /* شاشة الترحيب */
        #splash {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            /* تختفي بعد 3 ثوانٍ */
            animation: fadeOut 0.5s forwards 3s;
        }

        /* اللوجو النابض */
        .logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(45deg, var(--light-red), var(--orange));
            border-radius: 20px;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite ease-in-out;
        }

        .brand-name {
            font-size: 35px;
            font-weight: bold;
            color: var(--light-red);
            margin: 0;
        }

        /* حركات الأنيميشن */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        /* واجهة المتجر الرئيسية */
        .main-page {
            height: 100vh;
            display: flex;
            flex-direction: column;
            text-align: center;
        }

        header {
            padding: 20px;
            background: linear-gradient(to right, var(--light-red), var(--orange));
            color: white;
        }

        .nav-bottom {
            position: fixed;
            bottom: 0; width: 100%;
            height: 60px;
            background: #f1f1f1;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #ddd;
        }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo"></div>
        <h1 class="brand-name">New Shop</h1>
    </div>

    <div class="main-page">
        <header>
            <h2>New Shop</h2>
        </header>
        <div style="margin-top: 50px;">
            <h3>مرحباً بك في المتجر</h3>
            <p>انتظر العروض القوية قريباً!</p>
        </div>
        <div class="nav-bottom">
            <span>🏠 الرئيسية</span>
            <span>🔍 بحث</span>
            <span>👤 حسابي</span>
        </div>
    </div>

</body>
</html>
